# Release Workflow for Sphinx Protocol
# Builds cross-platform binaries and creates GitHub releases
name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies for Fyne/GUI
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libegl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build for Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o sphinxfnd-linux-amd64 ./src/cli

      - name: Build for Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o sphinxfnd-linux-arm64 ./src/cli

      - name: Build for macOS amd64
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o sphinxfnd-darwin-amd64 ./src/cli

      - name: Build for macOS arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o sphinxfnd-darwin-arm64 ./src/cli

      - name: Build for Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o sphinxfnd-windows-amd64.exe ./src/cli

      - name: Build for Windows arm64
        run: |
          GOOS=windows GOARCH=arm64 go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o sphinxfnd-windows-arm64.exe ./src/cli

      - name: Create archives
        run: |
          tar -czvf sphinxfnd-linux-amd64.tar.gz sphinxfnd-linux-amd64
          tar -czvf sphinxfnd-linux-arm64.tar.gz sphinxfnd-linux-arm64
          tar -czvf sphinxfnd-darwin-amd64.tar.gz sphinxfnd-darwin-amd64
          tar -czvf sphinxfnd-darwin-arm64.tar.gz sphinxfnd-darwin-arm64
          zip sphinxfnd-windows-amd64.zip sphinxfnd-windows-amd64.exe
          zip sphinxfnd-windows-arm64.zip sphinxfnd-windows-arm64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Sphinx Protocol v${{ steps.version.outputs.version }}
            
            ### Downloads
            - **Linux (amd64)**: `sphinxfnd-linux-amd64.tar.gz`
            - **Linux (arm64)**: `sphinxfnd-linux-arm64.tar.gz`
            - **macOS (amd64)**: `sphinxfnd-darwin-amd64.tar.gz`
            - **macOS (arm64)**: `sphinxfnd-darwin-arm64.tar.gz`
            - **Windows (amd64)**: `sphinxfnd-windows-amd64.zip`
            - **Windows (arm64)**: `sphinxfnd-windows-arm64.zip`
          files: |
            sphinxfnd-linux-amd64.tar.gz
            sphinxfnd-linux-arm64.tar.gz
            sphinxfnd-darwin-amd64.tar.gz
            sphinxfnd-darwin-arm64.tar.gz
            sphinxfnd-windows-amd64.zip
            sphinxfnd-windows-arm64.zip
          draft: false
          prerelease: false