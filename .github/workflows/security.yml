# Security Workflow for Sphinx Protocol
# Runs vulnerability scanning and CodeQL analysis
name: Security
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly security scans on Sundays
    - cron: '0 0 * * 0'

jobs:
  vuln-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        # Exit code 3 means vulnerabilities found (not a failure)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Exclude GUI packages that require system libraries
          # govulncheck returns exit code 3 when vulnerabilities are found (reporting them, not failing)
          govulncheck $(go list ./... | grep -v 'fyne.io' | grep -v 'go-gl') || true

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies for CodeQL
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libegl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev pkg-config libglfw3 libglfw3-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3